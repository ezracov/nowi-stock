<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Card App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">📦 Stock Card Gudang</h2>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">Scan / Input Token</label>
            <div class="flex gap-2 mt-1">
                <input type="text" id="tokenInput" class="border rounded-lg p-2 flex-grow" placeholder="Contoh: ATK-001">
                <button onclick="cekStok()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Cari</button>
            </div>
        </div>

        <div id="infoBarang" class="hidden mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
            <p class="text-sm text-blue-600">Nama Barang:</p>
            <p id="namaDisplay" class="font-bold text-lg">-</p>
            <p class="text-sm text-blue-600 mt-2">Stok Saat Ini:</p>
            <p id="stokDisplay" class="font-bold text-3xl">0</p>
        </div>

            <div id="wrapperTombolAksi" class="hidden mb-4">
                <button onclick="toggleForm()" id="btnToggleForm" class="w-full bg-indigo-50 text-indigo-600 font-semibold py-2 rounded-lg border border-indigo-200 hover:bg-indigo-100 transition">
                    + Tambah Mutasi (Masuk/Keluar)
                </button>
            </div>

            <div id="formMutasi" class="hidden space-y-4 p-4 bg-gray-50 rounded-lg border border-gray-200 mb-6">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-gray-700">Input Mutasi Baru</h3>
                    <button onclick="toggleForm()" class="text-gray-400 hover:text-red-500">✕</button>
                </div>
                <hr>
                <div>
                    <label class="block text-sm font-medium">Tipe Mutasi</label>
                    <select id="tipeMutasi" class="w-full border rounded-lg p-2 mt-1">
                        <option value="Masuk">Barang Masuk (+)</option>
                        <option value="Keluar">Barang Keluar (-)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium">Jumlah</label>
                    <input type="number" id="jumlahInput" class="w-full border rounded-lg p-2 mt-1" placeholder="0">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Keterangan</label>
                    <input type="text" id="keteranganInput" class="w-full border rounded-lg p-2 mt-1" placeholder="Alasan mutasi...">
                </div>
                <button onclick="simpanMutasi()" id="btnSimpan" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 shadow-lg">
                    Simpan Mutasi
                </button>
        </div>

        <div id="sectionHistori" class="hidden mt-8">
            <h3 class="font-bold text-gray-700 mb-2 underline text-sm">Riwayat Mutasi</h3>
            <div class="overflow-y-auto border rounded-lg" style="max-height: 300px;">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50 sticky top-0">
                        <tr>
                            <th class="p-3 bg-gray-50">Tipe</th>
                            <th class="p-3 bg-gray-50 text-right font-bold">Qty & Ket</th>
                        </tr>
                    </thead>
                    <tbody id="tabelHistori" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwf8BTTOc4RZV8qOu23M7TMDd1I6hc4ew_83BXN2b0iaxmWI3k7u_ec6tCWnUkmlb2U/exec";

        async function cekStok() {
            const token = document.getElementById('tokenInput').value;
            if(!token) return alert("Masukkan token!");

            try {
                const res = await fetch(`${API_URL}?token=${token}`);
                const data = await res.json();

                document.getElementById('infoBarang').classList.remove('hidden');
                document.getElementById('sectionHistori').classList.remove('hidden');
                document.getElementById('wrapperTombolAksi').classList.remove('hidden'); // Munculkan tombol utama
                document.getElementById('formMutasi').classList.add('hidden'); // Pastikan form input tetap sembunyi dulu
                
                document.getElementById('namaDisplay').innerText = data.namaBarang;
                document.getElementById('stokDisplay').innerText = data.stokAkhir;



                const tabel = document.getElementById('tabelHistori');
                tabel.innerHTML = "";
                
                data.histori.forEach(item => {
                    // Membuat format tanggal Indonesia yang lengkap & jelas
                    const opsiTanggal = { 
                        weekday: 'short', 
                        day: '2-digit', 
                        month: 'short', 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    };
                    const tgl = new Date(item.timestamp).toLocaleString('id-ID', opsiTanggal).replace('.', ':');
                    
                    const warna = item.tipe === "Masuk" ? "text-green-600" : "text-red-600";
                    const simbol = item.tipe === "Masuk" ? "+" : "-";
                    
                    tabel.innerHTML += `
                        <tr class="hover:bg-gray-50">
                            <td class="p-3 font-medium ${warna}">${item.tipe}</td>
                            <td class="p-3 text-right">
                                <div class="font-bold text-gray-900">${simbol}${item.jumlah}</div>
                                <div class="text-[11px] font-semibold text-gray-600">${item.keterangan || '-'}</div>
                                <div class="text-[10px] text-gray-400 italic">${tgl} WIB</div>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                alert("Gagal mengambil data. Pastikan Apps Script sudah di-deploy sebagai 'Anyone'.");
            }
        }

        async function simpanMutasi() {
            const btn = document.getElementById('btnSimpan');
            const payload = {
                token: document.getElementById('tokenInput').value,
                namaBarang: document.getElementById('namaDisplay').innerText,
                tipe: document.getElementById('tipeMutasi').value,
                jumlah: document.getElementById('jumlahInput').value,
                user: "Admin Gudang", // Tambahkan koma di sini
                keterangan: document.getElementById('keteranganInput').value || "-"
            };

            if(!payload.jumlah || payload.jumlah <= 0) return alert("Isi jumlah!");

            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                alert("Mutasi Berhasil Dicatat!");
                location.reload(); 
            } catch (e) {
                alert("Gagal simpan!");
                btn.disabled = false;
                btn.innerText = "Simpan Mutasi";
            }
        }

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenDariUrl = urlParams.get('token');
            if (tokenDariUrl) {
                document.getElementById('tokenInput').value = tokenDariUrl;
                await cekStok();
            }
        };

        function toggleForm() {
            const form = document.getElementById('formMutasi');
            const btnAksi = document.getElementById('btnToggleForm');
            
            if (form.classList.contains('hidden')) {
                form.classList.remove('hidden');
                btnAksi.innerText = "✕ Batalkan";
                btnAksi.classList.replace('bg-indigo-50', 'bg-red-50');
                btnAksi.classList.replace('text-indigo-600', 'text-red-600');
            } else {
                form.classList.add('hidden');
                btnAksi.innerText = "+ Tambah Mutasi (Masuk/Keluar)";
                btnAksi.classList.replace('bg-red-50', 'bg-indigo-50');
                btnAksi.classList.replace('text-red-600', 'text-indigo-600');
            }
        }
    </script>
</body>
</html>
